<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Montjuïc" />
    <meta name="theme-color" content="#07070a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <title>El Secreto de Montjuïc</title>
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%; background: #07070a; overflow: hidden;
        touch-action: none; -webkit-user-select: none; user-select: none;
        overscroll-behavior: none; -webkit-tap-highlight-color: transparent;
      }
      body { display: flex; align-items: center; justify-content: center; }
      #game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      }
      #rotate {
        position: fixed; inset: 0; background: #07070a; color: #e8dcb0;
        display: none; align-items: center; justify-content: center; flex-direction: column;
        font-family: 'Courier New', monospace; text-align: center; z-index: 10; padding: 24px;
      }
      #rotate.show { display: flex; }
      #rotate .ico { font-size: 54px; margin-bottom: 18px; animation: rot 1.8s ease-in-out infinite; }
      #rotate .sub { font-size: 13px; opacity: 0.65; margin-top: 10px; }
      @keyframes rot { 0%, 45% { transform: rotate(0deg); } 65%, 100% { transform: rotate(90deg); } }
      #pwahint {
        position: fixed; left: 0; right: 0; top: 0; z-index: 20; display: none;
        background: rgba(18, 14, 22, 0.95); color: #e8dcb0; border-bottom: 2px solid #5a4632;
        font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.45;
        padding: 9px 40px 9px 12px; text-align: center;
      }
      #pwahint.show { display: block; }
      #pwahint b { color: #f5c84a; }
      #pwahint .x { position: absolute; right: 6px; top: 5px; padding: 3px 9px; font-size: 16px; cursor: pointer; color: #c9b88a; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="rotate">
      <div class="ico">📱</div>
      <div id="rotatemsg">Rotate your device to landscape</div>
      <div class="sub">El Secreto de Montjuïc</div>
    </div>
    <audio id="audiosink" playsinline></audio>
    <div id="pwahint">
      <span id="pwahinttext">📲 For <b>fullscreen</b>: tap <b>Share</b> and <b>Add to Home Screen</b>, then open the game from the icon.</span>
      <span class="x" id="pwahintx">✕</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
